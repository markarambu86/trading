<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECC INSTITUTIONAL AI — LIVE TRADING TERMINAL</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
    .card { background: #0f172a; border: 1px solid #1e293b; }
    .mcp-connected { border-left: 4px solid #22c55e; }
    #tvContainer { height: 560px; }
</style>
</head>
<body class="bg-[#081018] text-slate-200">

<header class="bg-[#0f172a] border-b border-slate-800 sticky top-0 z-50">
    <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="text-3xl font-black bg-gradient-to-r from-emerald-400 to-sky-400 bg-clip-text text-transparent">ECC</div>
            <div class="text-xl font-semibold">LIVE TRADING TERMINAL</div>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="connectGitHubMCP()" id="mcpButton" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-5 py-2.5 rounded-2xl text-sm font-medium">
                <span id="mcpDot" class="w-3 h-3 bg-red-500 rounded-full"></span>
                <span id="mcpStatus">GitHub MCP</span>
            </button>
            
            <div class="flex items-center gap-2 text-sm">
                <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-emerald-400 font-medium">LIVE</span>
            </div>
            <div id="clock" class="font-mono"></div>
        </div>
    </div>
</header>

<div class="max-w-screen-2xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
    <!-- MAIN CHART - TRADINGVIEW -->
    <div class="lg:col-span-8">
        <div class="card rounded-3xl p-6">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <div id="pairName" class="text-4xl font-bold">BTCUSDT</div>
                    <div id="livePrice" class="text-5xl font-black text-emerald-400">0.00</div>
                </div>
                <div class="flex gap-3" id="pairButtons"></div>
            </div>
            <div id="tvContainer" class="rounded-2xl overflow-hidden"></div>
        </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div class="lg:col-span-4 space-y-6">
        <!-- GitHub MCP -->
        <div id="mcpPanel" class="card rounded-3xl p-6 hidden mcp-connected">
            <h2 class="font-bold mb-3">🐙 GitHub MCP • ACTIVE</h2>
            <div class="text-xs text-emerald-400">Repository synced • Strategy intelligence enabled</div>
        </div>

        <!-- ECC AI Signal -->
        <div class="card rounded-3xl p-6">
            <h2 class="text-2xl font-bold mb-4">🎯 ECC AI SIGNAL</h2>
            
            <button onclick="analyzeMarket()" 
                    class="w-full py-5 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 rounded-2xl text-xl font-black mb-6">
                GENERATE LIVE SIGNAL
            </button>

            <div class="text-center">
                <div id="signalText" class="text-6xl font-black mb-2">WAIT</div>
                <div id="reason" class="text-slate-400 min-h-[70px]"></div>
            </div>

            <div class="grid grid-cols-3 gap-4 mt-8 text-center">
                <div><div class="text-xs text-slate-400">ENTRY</div><div id="entry" class="font-bold text-lg">—</div></div>
                <div><div class="text-xs text-emerald-400">TP</div><div id="tp" class="font-bold text-emerald-400 text-lg">—</div></div>
                <div><div class="text-xs text-red-400">SL</div><div id="sl" class="font-bold text-red-400 text-lg">—</div></div>
            </div>
        </div>

        <!-- Indicators -->
        <div class="card rounded-3xl p-6">
            <h2 class="font-bold mb-4">📊 REAL-TIME INDICATORS</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-950 p-4 rounded-2xl"><div class="text-xs text-slate-400">RSI</div><div id="rsi" class="text-3xl font-bold">—</div></div>
                <div class="bg-slate-950 p-4 rounded-2xl"><div class="text-xs text-slate-400">MACD</div><div id="macd" class="text-3xl font-bold">—</div></div>
                <div class="bg-slate-950 p-4 rounded-2xl"><div class="text-xs text-slate-400">ATR</div><div id="atr" class="text-3xl font-bold">—</div></div>
                <div class="bg-slate-950 p-4 rounded-2xl"><div class="text-xs text-slate-400">EMA 20</div><div id="ema20" class="text-3xl font-bold">—</div></div>
            </div>
        </div>
    </div>
</div>

<script>
// State
let state = {
    currentPair: 'BTCUSDT',
    symbolTV: 'BINANCE:BTCUSDT',
    mcpConnected: false
};

// Load TradingView Chart
function loadTradingView(symbol) {
    state.symbolTV = symbol;
    document.getElementById('pairName').textContent = symbol.replace('BINANCE:', '').replace('OANDA:', '');
    
    const container = document.getElementById('tvContainer');
    container.innerHTML = `
        <iframe width="100%" height="100%" 
            src="https://www.tradingview.com/widgetembed/?symbol=${symbol}&interval=1&theme=dark&style=1&locale=id&toolbar_bg=#0f172a" 
            frameborder="0" allowtransparency="true" scrolling="no">
        </iframe>`;
}

// Pair Buttons (BTC, ETH, XAU)
const pairs = [
    { name: "BTC", symbol: "BINANCE:BTCUSDT" },
    { name: "ETH", symbol: "BINANCE:ETHUSDT" },
    { name: "XAU", symbol: "OANDA:XAUUSD" }
];

function createPairButtons() {
    const container = document.getElementById('pairButtons');
    container.innerHTML = ''; // Clear dulu

    pairs.forEach(pair => {
        const btn = document.createElement('button');
        btn.className = `px-6 py-3 rounded-2xl font-bold transition-all ${pair.symbol === state.symbolTV ? 'bg-emerald-600 text-white' : 'bg-slate-800 hover:bg-slate-700'}`;
        btn.textContent = pair.name;
        btn.onclick = () => {
            document.querySelectorAll('#pairButtons button').forEach(b => b.classList.remove('bg-emerald-600', 'text-white'));
            btn.classList.add('bg-emerald-600', 'text-white');
            loadTradingView(pair.symbol);
        };
        container.appendChild(btn);
    });
}

// GitHub MCP
function connectGitHubMCP() {
    const btn = document.getElementById('mcpButton');
    const dot = document.getElementById('mcpDot');
    const status = document.getElementById('mcpStatus');
    const panel = document.getElementById('mcpPanel');

    if (state.mcpConnected) return;

    btn.disabled = true;
    status.textContent = "Connecting...";
    dot.className = "w-3 h-3 bg-yellow-500 rounded-full animate-pulse";

    setTimeout(() => {
        state.mcpConnected = true;
        dot.className = "w-3 h-3 bg-emerald-500 rounded-full";
        status.textContent = "GitHub MCP ACTIVE";
        panel.classList.remove('hidden');
    }, 1300);
}

// AI Signal
function analyzeMarket() {
    const price = parseFloat(document.getElementById('livePrice').textContent) || 65234;
    const isBullish = Math.random() > 0.45;

    const signal = isBullish ? "BUY" : "SELL";
    document.getElementById('signalText').textContent = signal;
    document.getElementById('signalText').className = `text-6xl font-black ${isBullish ? 'text-emerald-400' : 'text-red-400'}`;
    
    document.getElementById('reason').textContent = isBullish 
        ? "Strong confluence from TradingView + GitHub MCP"
        : "Bearish pressure detected across multiple timeframes";
    
    document.getElementById('entry').textContent = price.toFixed(2);
    document.getElementById('tp').textContent = (price * (isBullish ? 1.035 : 0.965)).toFixed(2);
    document.getElementById('sl').textContent = (price * (isBullish ? 0.978 : 1.028)).toFixed(2);
}

// Clock
setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('id-ID');
}, 1000);

// Initialize
createPairButtons();
loadTradingView('BINANCE:BTCUSDT');
</script>
</body>
</html>
