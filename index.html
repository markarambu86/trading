body{

.container{

.header{
    display:flex;
    justify-content:space-between;

}

.logo{

    display:flex;

.dot{

@keyframes pulse{
    0%{transform:scale(.9);}

    100%{transform:scale(.9);}
}

    display:grid;
    grid-template-columns:1fr 420px;

}

    .main{

}

.card{

}

.card h2{
    margin-bottom:16px;

}

#chart{
    width:100%;

}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.price{
    font-size:38px;
    font-weight:900;
}

.green{
    color:#22c55e;
}

.red{
    color:#ef4444;
}

.yellow{
    color:#facc15;
}

.select{
    background:#111827;
    border:1px solid #1e293b;
    padding:10px;
    color:white;
    border-radius:8px;

.signal-box{
    text-align:center;
    padding:25px;
    background:#111827;
    border-radius:14px;
}

.signal{
    font-size:46px;

}

.reason{
    margin-top:15px;
    color:#cbd5e1;

}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.stat{
    background:#111827;
    border-radius:10px;
    padding:15px;
}

.label{
    font-size:12px;
    color:#94a3b8;
    margin-bottom:8px;
}

.value{
    font-size:24px;
    font-weight:800;
}

.progress{
    height:12px;
    background:#1f2937;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#22c55e,#38bdf8);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #1e293b;
    font-size:12px;
}

th{
    color:#38bdf8;
}

.badge-buy{
    background:rgba(34,197,94,.2);
    color:#22c55e;
    padding:5px 10px;
    border-radius:6px;
}

.badge-sell{
    background:rgba(239,68,68,.2);
    color:#ef4444;
    padding:5px 10px;
    border-radius:6px;
}

.news{
    background:#111827;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

.small{
    color:#94a3b8;
    font-size:11px;
    margin-top:6px;
}

</style>

<script>

const FINNHUB_API =
'd8a56ahr01qplfv1oougd8a56ahr01qplfv1oov0';

let socket;

let currentSymbol = 'btcusdt';

let closes = [];
let highs = [];
let lows = [];
let volumes = [];

const chart =
LightweightCharts.createChart(
document.getElementById('chart'),
{
    layout:{
        background:{color:'#0f172a'},
        textColor:'#cbd5e1'
    },

    grid:{
        vertLines:{color:'#1e293b'},
        horzLines:{color:'#1e293b'}
    },

    timeScale:{
        borderColor:'#1e293b',
        timeVisible:true
    },

    rightPriceScale:{
        borderColor:'#1e293b'
    }
});

const candleSeries =
chart.addCandlestickSeries({
    upColor:'#22c55e',
    downColor:'#ef4444',
    borderVisible:false,
    wickUpColor:'#22c55e',
    wickDownColor:'#ef4444'
});

async function loadCryptoHistory(){

    const url =
`https://api.binance.com/api/v3/klines?symbol=${currentSymbol.toUpperCase()}&interval=1m&limit=200`;

    const res = await fetch(url);

    const data = await res.json();

    const candles = data.map(c=>({

        time:Math.floor(c[0]/1000),
        open:parseFloat(c[1]),
        high:parseFloat(c[2]),
        low:parseFloat(c[3]),
        close:parseFloat(c[4])

    }));

    candleSeries.setData(candles);

    closes = data.map(c=>parseFloat(c[4]));
    highs = data.map(c=>parseFloat(c[2]));
    lows = data.map(c=>parseFloat(c[3]));
    volumes = data.map(c=>parseFloat(c[5]));

}

async function loadForexHistory(){

    const now =
    Math.floor(Date.now()/1000);

    const from =
    now - (60*200);

    const url =
`https://finnhub.io/api/v1/forex/candle?symbol=OANDA:${currentSymbol}&resolution=1&from=${from}&to=${now}&token=${FINNHUB_API}`;

    const res = await fetch(url);

    const data = await res.json();

    const candles = data.c.map((c,i)=>({

        time:data.t[i],
        open:data.o[i],
        high:data.h[i],
        low:data.l[i],
        close:data.c[i]

    }));

    candleSeries.setData(candles);

    closes = data.c;
    highs = data.h;
    lows = data.l;
    volumes = data.v;

}

function connectCryptoSocket(){

    if(socket) socket.close();

    socket = new WebSocket(
`wss://stream.binance.com:9443/ws/${currentSymbol}@kline_1m`
    );

    socket.onmessage = (event)=>{

        const msg = JSON.parse(event.data);

        const k = msg.k;

        const candle = {

            time:Math.floor(k.t/1000),
            open:parseFloat(k.o),
            high:parseFloat(k.h),
            low:parseFloat(k.l),
            close:parseFloat(k.c)

        };

        candleSeries.update(candle);

        document.getElementById('livePrice')
        .innerText =
        candle.close.toLocaleString();

        updateRealtime(candle);

    };

    socket.onclose = ()=>{

        setTimeout(connectCryptoSocket,2000);

    };

}

async function pollForex(){

    const now =
    Math.floor(Date.now()/1000);

    const from =
    now - 60;

    const url =
`https://finnhub.io/api/v1/forex/candle?symbol=OANDA:${currentSymbol}&resolution=1&from=${from}&to=${now}&token=${FINNHUB_API}`;

    const res = await fetch(url);

    const data = await res.json();

    if(!data.c) return;

    const candle = {

        time:data.t[data.t.length-1],
        open:data.o[data.o.length-1],
        high:data.h[data.h.length-1],
        low:data.l[data.l.length-1],
        close:data.c[data.c.length-1]

    };

    candleSeries.update(candle);

    document.getElementById('livePrice')
    .innerText =
    candle.close.toFixed(5);

    updateRealtime(candle);

}

function updateRealtime(candle){

    closes.push(candle.close);
    highs.push(candle.high);
    lows.push(candle.low);

    if(closes.length > 300){

        closes.shift();
        highs.shift();
        lows.shift();

    }

    runAI(candle.close);

}

function EMA(period,data){

    const k = 2/(period+1);

    let ema = data[0];

    for(let i=1;i<data.length;i++){

        ema =
        data[i]*k + ema*(1-k);

    }

    return ema;

}

function RSI(period,data){

    if(data.length < period+1)
        return 50;

    let gain = 0;
    let loss = 0;

    for(let i=data.length-period;i<data.length;i++){

        const diff =
        data[i]-data[i-1];

        if(diff > 0)
            gain += diff;
        else
            loss += Math.abs(diff);

    }

    const rs =
    gain/(loss || 1);

    return 100-(100/(1+rs));

}

function ATR(period){

    let trs = [];

    for(let i=1;i<highs.length;i++){

        trs.push(
            Math.max(
                highs[i]-lows[i],
                Math.abs(highs[i]-closes[i-1]),
                Math.abs(lows[i]-closes[i-1])
            )
        );

    }

    return trs.reduce((a,b)=>a+b,0)/trs.length;

}

function runAI(price){

    if(closes.length < 50)
        return;

    const ema9 =
    EMA(9,closes);

    const ema21 =
    EMA(21,closes);

    const ema200 =
    EMA(100,closes);

    const rsi =
    RSI(14,closes);

    const atr =
    ATR(14);

    let bullish = 0;
    let bearish = 0;

    if(ema9 > ema21)
        bullish += 25;
    else
        bearish += 25;

    if(ema21 > ema200)
        bullish += 25;
    else
        bearish += 25;

    if(rsi > 55)
        bullish += 20;

    if(rsi < 45)
        bearish += 20;

    if(price > ema9)
        bullish += 15;
    else
        bearish += 15;

    const volumeSpike =
    volumes[volumes.length-1] >
    (
        volumes.reduce((a,b)=>a+b,0)
        /volumes.length
    )*1.5;

    if(volumeSpike)
        bullish += 15;

    let signal = 'WAIT';

    let confidence = 50;

    if(bullish >= 70){

        signal = 'BUY';
        confidence = bullish;

    }
    else if(bearish >= 70){

        signal = 'SELL';
        confidence = bearish;

    }

    let sl = 0;
    let tp = 0;

    if(signal === 'BUY'){

        sl = price - (atr*1.5);
        tp = price + (atr*3);

    }

    if(signal === 'SELL'){

        sl = price + (atr*1.5);
        tp = price - (atr*3);

    }

    updateUI({

        signal,
        confidence,
        rsi,
        atr,
        sl,
        tp,
        bullish,
        bearish,
        ema9,
        ema21

    },price);

}

function updateUI(data,price){

    const signal =
    document.getElementById('signal');

    signal.innerText =
    data.signal;

    signal.className =
    'signal';

    if(data.signal === 'BUY')
        signal.classList.add('green');

    else if(data.signal === 'SELL')
        signal.classList.add('red');

    else
        signal.classList.add('yellow');

    document.getElementById('confidenceText')
    .innerText =
    data.confidence + '%';

    document.getElementById('confidenceBar')
    .style.width =
    data.confidence + '%';

    document.getElementById('rsiVal')
    .innerText =
    data.rsi.toFixed(2);

    document.getElementById('atrVal')
    .innerText =
    data.atr.toFixed(2);

    document.getElementById('trendVal')
    .innerText =
    data.ema9 > data.ema21
    ? 'BULL'
    : 'BEAR';

    document.getElementById('flowVal')
    .innerText =
    data.bullish > data.bearish
    ? 'BUY FLOW'
    : 'SELL FLOW';

    document.getElementById('smcVal')
    .innerText =
    data.bullish > data.bearish
    ? 'BOS'
    : 'CHOCH';

    document.getElementById('slVal')
    .innerText =
    data.sl.toFixed(2);

    document.getElementById('tpVal')
    .innerText =
    data.tp.toFixed(2);

    document.getElementById('volVal')
    .innerText =
    volumes[volumes.length-1]
    .toFixed(0);

    document.getElementById('reason')
    .innerText =
`
EMA Trend aktif,
RSI Momentum tervalidasi,
ATR Volatility aktif,
Orderflow terdeteksi,
Smart Money terdeteksi,
AI Confidence ${data.confidence}%.
`;

    if(data.signal !== 'WAIT')
        addJournal(data,price);

}

function addJournal(data,price){

    const tbody =
    document.getElementById('journal');

    const row =
    document.createElement('tr');

    row.innerHTML = `
<td>${new Date().toLocaleTimeString()}</td>
<td>
<span class="${
data.signal==='BUY'
?'badge-buy'
:'badge-sell'
}">
${data.signal}
</span>
</td>
<td>${price.toFixed(2)}</td>
<td>${data.sl.toFixed(2)}</td>
<td>${data.tp.toFixed(2)}</td>
<td>${data.confidence}%</td>
`;

    tbody.prepend(row);

    while(tbody.rows.length > 20){

        tbody.deleteRow(20);

    }

}

async function loadNews(){

    const res =
    await fetch(
`https://finnhub.io/api/v1/news?category=general&token=${FINNHUB_API}`
    );

    const news =
    await res.json();

    const box =
    document.getElementById('newsBox');

    box.innerHTML = '';

    news.slice(0,5).forEach(n=>{

        box.innerHTML += `
<div class="news">

<div>
${n.headline}
</div>

<div class="small">
${new Date(
n.datetime*1000
).toLocaleString()}
</div>

</div>
`;

    });

}

document.getElementById('symbolSelect')
.addEventListener('change',
async(e)=>{

    currentSymbol =
    e.target.value;

    document.getElementById('pairName')
    .innerText =
    currentSymbol.toUpperCase();

    closes = [];
    highs = [];
    lows = [];
    volumes = [];

    if(currentSymbol.includes('usdt')){

        await loadCryptoHistory();

        connectCryptoSocket();

    }
    else{

        await loadForexHistory();

        if(socket)
            socket.close();

    }

});

async function init(){

    await loadCryptoHistory();

    connectCryptoSocket();

    loadNews();

    setInterval(loadNews,300000);

    setInterval(()=>{

        if(
            !currentSymbol.includes('usdt')
        ){

            pollForex();

        }

    },5000);

}

init();

</script>
